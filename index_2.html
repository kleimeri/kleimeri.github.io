<!DOCTYPE html>
<html lang='en'>
      <head>
        <meta charset='UTF-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
          <title>Document</title>
        </head>
        
  <style>
    body{
      height: 100vh;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      background: #000;
    }
    .container{
      width: 150px;
      height: 175px;
      display: flex;
      flex-wrap: wrap;
      background-color: transparent;
    }

    .container div{
      border-radius: 5px;
      transition: 0.5s;
    }
    

    .inner__box_1{
      width: 150px;
      height: 25px;
    }.inner__box_2{
      width: 100px;
      height: 50px;
    }.inner__box_3{
      width: 50px;
        height: 50px;
    }.inner__box_4{
      width: 50px;
        height: 100px;
    }.inner__box_5{
      width: 100px;
      height: 50px;
    }.inner__box_6{
      width: 100px;
      height: 50px;
    }
    .box_1 {
      width: 0px;
      height: 0px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_1;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 0.5s;
    }
    @keyframes animBox_1 {
      0%{
        width: 0px;
        height: 0px;
        border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);

      }
      100%{
        width: 149px;
        height: 23px;
      }
    }
    .box_2 {
      width: 0px;
      height: 0px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_2;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 1s;
      
    }
    @keyframes animBox_2 {
      0%{
        width: 0px;
        height: 0px;
        border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);

      }
      100%{
        width: 98px;
        height: 48px;
      }
    }
    .box_3 {
      /* width: 48px;
      height: 48px; */
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_3;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 1.5s;
    }
    @keyframes animBox_3 {
      0%{
        width: 0px;
        height: 0px;
        border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);

      }
      100%{
        width: 48px;
        height: 48px;
      }
    }
    .box_4 {
      /* width: 49px;
      height: 98.5px; */
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_4;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 2s;
    }
    @keyframes animBox_4 {
      0%{
        width: 0px;
        height: 0px;
        border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);

      }
      100%{
        width: 49px;
        height: 98.5px;
      }
    }
    .box_5 {
      /* width: 97px;
      height: 50px; */
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_5;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 2.5s;
    }
    @keyframes animBox_5 {
      0%{
        width:  0px;
      height: 0px;
      border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);
      
      }
      100%{
        width: 98px;
      height: 48px;
      }
    }
    .box_6 {
      /* width: 97px;
      height: 47px; */
      border: 1px solid rgba(255,255,255,0.2);
      background: #292929;
      animation: animBox_6;
      animation-duration: 0.5s;
      animation-direction:normal;
      animation-fill-mode:both;
      animation-delay: 3s;
    }
    @keyframes animBox_6 {
      0%{
        width:  0px;
      height: 0px;
      border: 0px solid rgba(255,255,255,0.2);

      }
      50%{
        border: 1px solid rgba(255,255,255,0.2);
      
      }
      100%{
        width: 98px;
      height: 48px;
      }
    }


    .close_boxs{
      width: 0px;
      height: 0px;
      border: 0px solid rgba(255,255,255,0.2);
      animation-name: animBox;
    }
  </style>
  <body>
    <div class="container">
      <div class="inner__box_1">
        <div class="box_1"></div>
      </div>
      <div class="inner__box_2">
        <div class="box_2"></div>
      </div>
      <div class="inner__box_3">
        <div class="box_3"></div>
      </div>
      <div class="inner__box_4">
        <div class="box_4"></div>
      </div>
        <section>
          <div class="inner__box_5">
            <div class="box_5"></div>
          </div>
          <div class="inner__box_6">
            <div class="box_6"></div>
          </div>
        </section>
    </div>
  </body>
</html>
