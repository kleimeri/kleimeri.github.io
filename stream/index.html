<!DOCTYPE html>
<html lang='en'>
      <head>
        <meta charset='UTF-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
        <script src="https://cdn.tailwindcss.com"></script>  
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
          <title>Document</title>
        </head>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');
          body{
            margin: 0px;
            background: transparent;
          }
          .wrapper{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .block{
            transition: 1s;
            border: 5px solid rgba(119, 119, 119, 0.658);
            -webkit-transform: skew(30deg);
            -moz-transform: skew(30deg);
            -o-transform: skew(30deg);
            transform: skew(30deg);
            box-shadow: inset 0px 0px 30px rgba(0, 0, 0);
          }
          .inner_block_1{
            transition: 1s;
            height: 100px;
            -webkit-transform: skew(30deg);
            -moz-transform: skew(30deg);
            -o-transform: skew(30deg);
            transform: skew(-30deg);
            margin-left: 30px;
            margin-right: 30px;
            text-shadow: rgb(0, 0, 0) 5px 10px 10px;
          }
          .inner_block_2{
            transition: 1s;
            height: 100px;
            -webkit-transform: skew(30deg);
            -moz-transform: skew(30deg);
            -o-transform: skew(30deg);
            transform: skew(-30deg);
            margin-left: 30px;
            margin-right: 30px;
            text-shadow: rgb(0, 0, 0) 5px 10px 10px;
          }
          .inner_block_3{
            transition: 1s;
            height: 100px;
            -webkit-transform: skew(30deg);
            -moz-transform: skew(30deg);
            -o-transform: skew(30deg);
            transform: skew(-30deg);
            margin-left: 30px;
            margin-right: 30px;
            text-shadow: rgb(0, 0, 0) 5px 10px 10px;
          }
          .inner_block_4{
            transition: 1s;
            height: 100px;
            -webkit-transform: skew(30deg);
            -moz-transform: skew(30deg);
            -o-transform: skew(30deg);
            transform: skew(-30deg);
            margin-left: 30px;
            margin-right: 30px;
            text-shadow: rgb(0, 0, 0) 5px 10px 10px;
          }
          .cast_text{
            font-family: 'Roboto', sans-serif;
            /* background: rgba(119, 119, 119, 0.658); */
          }
        </style>
    <body>
        <div class="wrapper">
            <div class="block bg-[#5e3e88] max-w-[0px] h-[0px] overflow-hidden opacity-0">
                <div class="inner_block_1 min-w-[700px] relative top-[0px] opacity-0 flex justify-center items-center text-white text-[40px] cast_text">IP cервера: 37.230.210.69:27015</div>
                <div class="inner_block_2 min-w-[700px] relative top-[0px] opacity-0 flex justify-center items-center text-white text-[40px] cast_text">Сайт сервера: play-css.ru</div>
                <div class="inner_block_3 min-w-[700px] relative top-[0px] opacity-0 flex justify-center items-center text-white text-[40px] cast_text">Подписывайся на канал!)</div>
                <div class="inner_block_4 min-w-[700px] relative top-[0px] opacity-0 flex justify-center items-center text-white text-[40px] cast_text">Вся инфа в описании!</div>
            </div>
        </div>
    </body>

  <script>
    let blockItems = document.querySelector('.block')

    let oneItem = document.querySelector('.inner_block_1')
    let twoItem = document.querySelector('.inner_block_2')
    let threeItem = document.querySelector('.inner_block_3')
    let fourItem = document.querySelector('.inner_block_4')

setInterval(() => {
  setTimeout(() => {

        // start
        //   
        setTimeout(() => {
          if(blockItems.classList.contains('max-w-[0px]')){
                console.log("начало анимки")
                blockItems.classList.remove('opacity-0')
                blockItems.classList.add('opacity-1')

                blockItems.classList.remove('max-w-[0px]')
                blockItems.classList.remove('max-w-[0px]')
                blockItems.classList.add('max-w-[800px]')
                blockItems.classList.add('h-[100px]')
            }
            oneItem.classList.remove('opacity-0')
            oneItem.classList.add('opacity-1')
            oneItem.classList.remove('top-[-0px]')
            oneItem.classList.add('top-[-5px]')
            console.log("блок 1 открылся")
        }, 900);

        //anim
        //
        setTimeout(() => {
          oneItem.classList.remove('top-[0px]')
          oneItem.classList.add('top-[-150px]')
          oneItem.classList.remove('opacity-1')
          oneItem.classList.add('opacity-0')
        }, 10000);
        setTimeout(() => {
          twoItem.classList.remove('top-[0px]')
          twoItem.classList.add('top-[-105px]')
          twoItem.classList.remove('opacity-0')
          twoItem.classList.add('opacity-1')
          console.log("блок 2 открылся")
        }, 10000);
        setTimeout(() => {
          twoItem.classList.remove('top-[-105px]')
          twoItem.classList.add('top-[-205px]')
          twoItem.classList.remove('opacity-1')
          twoItem.classList.add('opacity-0')
        }, 20000);
        setTimeout(() => {
          threeItem.classList.remove('top-[0px]')
          threeItem.classList.add('top-[-205px]')
          threeItem.classList.remove('opacity-0')
          threeItem.classList.add('opacity-1')
          console.log("блок 3 открылся")
        }, 20000);
        setTimeout(() => {
          threeItem.classList.remove('top-[-205px]')
          threeItem.classList.add('top-[-305px]')
          threeItem.classList.remove('opacity-0')
          threeItem.classList.add('opacity-1')
        }, 30000);
        setTimeout(() => {
          fourItem.classList.remove('top-[0px]')
          fourItem.classList.add('top-[-305px]')
          fourItem.classList.remove('opacity-0')
          fourItem.classList.add('opacity-1')
          console.log("блок 4 открылся")
        }, 30000);
        setTimeout(() => {
          fourItem.classList.remove('top-[-305px]')
          fourItem.classList.add('top-[-405px]')
          fourItem.classList.remove('opacity-0')
          fourItem.classList.add('opacity-1')
        }, 40000);

        // end 
        //
        setTimeout(() => {
            oneItem.classList.remove('top-[-150px]')
            oneItem.classList.add('top-[0px]')
          
            twoItem.classList.remove('top-[-205px]')
            twoItem.classList.add('top-[0px]')

            threeItem.classList.remove('top-[-305px]')
            threeItem.classList.add('top-[0px]')

            fourItem.classList.remove('top-[-405px]')
            fourItem.classList.add('top-[0px]')
          
            blockItems.classList.remove('opacity-1')
            blockItems.classList.add('opacity-0')
          
            blockItems.classList.remove('max-w-[800px]')
            blockItems.classList.add('max-w-[0px]')
            blockItems.classList.remove('h-[100px]')
            blockItems.classList.add('h-[0px]')
            console.log("конец анимки")
        }, 41000);

  }, 1);
}, 50000);




  </script>
</html>
