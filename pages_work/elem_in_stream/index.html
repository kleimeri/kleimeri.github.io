<!DOCTYPE html>
<html lang='en'>
               <head>
                    <meta charset='UTF-8'>
                    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
                    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
                         
                    </head>
     <style>
     body{
          margin: 0px;
     }
     .a{
          background-color: green;
          min-width: 100vw;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
     }
     .d{
          background-color: #7cb2ff;
          background: linear-gradient(312deg, #00aaff , #004161 );
          width: 90px;
          height: 90px;
          display: flex;
          align-items: center;
          border-radius: 1000px;
          border: 5px solid #00aaff;
          animation-name: bl;
          animation-timing-function: linear;
          animation-duration: 10s;
          animation-iteration-count: infinite;
          animation-delay: 5s;
          transition: 1s;
          overflow: hidden;
          opacity: 0;
     }
     .ico_tg{
          padding: 7px;
          min-width: 80px;
          min-height: 80px;
          background: linear-gradient(312deg, #00aaff , #004161 );
          border-radius: 100%;
          border: 5px solid #00aaff;
          margin-left: -5px;
          display: flex;
          align-items: center;
          justify-content: center;


     }
     .img_tg{
          background-image: url(tg.png);
          background-repeat: no-repeat;
          background-size: 100%;
          min-width: 65px;
          min-height: 65px;
          margin-left: -10px;
          position: relative;

     }
     .text_tg{
          margin: auto;
          font-size: 45px;
          font-family: 'Rubik-reg';
          color: #580084;
          max-width: min-content;
     }
     @font-face {
          font-family: 'Rubik-reg';
          src: url(/RubikMonoOne-Regular.ttf);
     }


     </style>
     <body>
          <div class="a">
               <div class="d" style="height: 90px;">
                    <div class="ico_tg">
                         <div class="img_tg"></div>
                    </div>
                    <div class="text_tg">
                         @kleimeri
                    </div>
               </div>
          </div>

     </body>
     <script src="/main.js"></script>
</html>
